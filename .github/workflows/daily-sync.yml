name: Sync Garmin data

on:
  schedule:
    - cron: "0 4 * * *"   # 06:00 Romania vara (UTC+2) / 07:00 iarna — ajusteaza daca vrei alta ora
  workflow_dispatch: {}    # permite pornire manuala: din tab-ul Actions SAU din butonul "Sync acum" (via Cloudflare Worker)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaleaza dependinte
        run: pip install -r requirements.txt

      - name: Extrage date Garmin
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENSTORE_B64: ${{ secrets.GARMIN_TOKENSTORE_B64 }}
        run: python scripts/fetch_garmin.py

      - name: Commit data.json
        run: |
          git config user.name "leo-os-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "sync: date Garmin $(date +'%Y-%m-%d %H:%M')"
          git push
